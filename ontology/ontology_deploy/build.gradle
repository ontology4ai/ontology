Set<File> getThirdPartJars() {
    configurations.runtimeClasspath.files.findAll { it-> true/*!(it.name.startsWith('ontology') && it.name.endsWith('.jar'))*/ }
}


bootJar {
    // 排除 src/main/resources/frontend 文件夹
    //excludes = ["**/frontend/**"]
    excludes = ["**/frontend/**","**/application/**","*.yaml","*.sh", "*.jar"]
    // 依赖 copyConfigFile 任务
 //   dependsOn unjarTask 
    dependsOn copyConfigYaml
    dependsOn copyConfigFile
    dependsOn copyConfigApp
    dependsOn copyModoJar  
    
//      exclude { details ->
//        // 使用正则表达式匹配文件名
//        def pattern = ~/(?!.*dmg_copilot).*\.jar$/
//        return details.file.name ==~ pattern
//    }

  //  from("${buildDir}/libs/unpacked"){
 //      into "/BOOT-INF/classes"
 //   } 
    
  //  doLast {
        // 在 bootJar 完成后删除指定的文件或目录
  //     delete "$buildDir/libs/unpacked"
 //      delete fileTree(dir: "${buildDir}/libs/lib", include: "data_supply-*.jar")
 //   }
    manifest.attributes.put('Class-Path',getThirdPartJars().collect { "lib/$it.name" }.join(' '))

    
}
tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}
