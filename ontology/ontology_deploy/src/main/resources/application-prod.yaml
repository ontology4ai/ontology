      mode: -1
      db-path: /
    main:
      jdbcUrl: ${APP_DB_URL:jdbc:mysql://10.1.251.221:5506/dmg_copilot?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&useSSL=false}
      username: ${APP_DB_USER:modo}
      password: ${APP_DB_PWD:rlkQ2rQ==}
      driverClassName: ${APP_DB_DRIVER:com.mysql.jdbc.Driver}
      maximumPoolSize: ${APP_DB_POOL_SIZE:20}
