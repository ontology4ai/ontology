      username: ${APP_DB_USER:modo}
      password: ${APP_DB_PWD:rlkQxCunT2rQ==}
      driverClassName: ${APP_DB_DRIVER:com.mysql.jdbc.Driver}
      maximumPoolSize: ${APP_DB_POOL_SIZE:20}
      connectionTimeout: ${APP_DB_CONNECTION_TIMEOUT:30000}
      dataSource:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false
    config:
      import: dataflow.yaml
      jdbcUrl: ${spring.datasource.main.jdbcUrl}
      username: ${spring.datasource.main.username}
      password: ${spring.datasource.main.password}
      driverClassName: ${spring.datasource.main.driverClassName}
      maximumPoolSize: 2
      dataSource:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false

  main:
    allow-bean-definition-overriding: true
  jpa:
    database: ${DB_TYPE:mysql}
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: update
      naming-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.MySQL5InnoDBDialect}
        generateDdl: false

