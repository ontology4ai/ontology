    ],
    "step":[
      {"source":"ods_customer_info","target":"dwd_fact_customer_detail"}
    ]
  },
  {
    "name":"order",
    "label":"订单",
    "node":[
      {"name":"ods_order_info","desc":"直接从业务系统采集的原始订单数据","type":"table"},
      {"name":"dwd_fact_order_detail","desc":"经过清洗、整合、标准化后，生成的订单明细表","type":"table"}
    ],
    "step":[
      {"source":"ods_order_info","target":"dwd_fact_order_detail"}
    ]
  },
  {
    "name":"road",
    "label":"公路",
    "node":[
      {"name":"road_info","desc":"公路明细表","type":"table"},
      {"name":"road_route","desc":"公路干线表","type":"table"},
      {"name":"路段信息文档","desc":"各类型公路信息Word文档","type":"doc"}
    ],
